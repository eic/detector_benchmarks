name: Mirror and Trigger EICweb

on:
  delete:
  push:
  workflow_dispatch:
    inputs:
      COMMON_BENCH_VERSION:
        description: 'common_bench branch/tag to use'
        required: false
        default: ''
      SOURCE_REPOSITORY:
        description: 'Repository to report status to (owner/repo)'
        required: false
        default: ''
      SOURCE_SHA:
        description: 'Commit SHA to report status to'
        required: false
        default: ''
      SOURCE_PR:
        description: 'PR number in source repository'
        required: false
        default: ''
      SOURCE_TITLE:
        description: 'Pipeline name / PR title'
        required: false
        default: ''

concurrency:
  group: mirror-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Mirror and Trigger EICweb
    runs-on: ubuntu-slim
    permissions:
      actions: write
      contents: read
      statuses: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Push to EICweb
      uses: eic/gitlab-sync@master
      with:
        remote: eicweb
        url: https://eicweb.phy.anl.gov/EIC/benchmarks/detector_benchmarks.git/
        token: ${{ secrets.GITLAB_TOKEN }}
        username: ${{ secrets.GITLAB_USERNAME }}
        ciskip: true
    - name: Push to code.jlab.org
      uses: eic/gitlab-sync@master
      with:
        remote: jlab
        url: https://code.jlab.org/EIC/detector_benchmarks.git/
        token: ${{ secrets.CODEJLAB_TOKEN }}
        username: ${{ secrets.CODEJLAB_USERNAME }}
        ciskip: true
    - name: Trigger EICweb
      id: trigger_eicweb
      uses: eic/trigger-gitlab-ci@v3
      if: ${{ github.event_name != 'delete' }}
      with:
        url: https://eicweb.phy.anl.gov
        project_id: 399
        token: ${{ secrets.EICWEB_DETECTOR_BENCHMARKS_TRIGGER }}
        ref_name: ${{ github.event.pull_request.head.ref || github.ref }}
        variables: |
          GITHUB_REPOSITORY=${{ inputs.SOURCE_REPOSITORY || github.repository }}
          GITHUB_SHA=${{ inputs.SOURCE_SHA || github.event.pull_request.head.sha || github.sha }}
          GITHUB_PR=${{ inputs.SOURCE_PR || github.event.pull_request.number }}
          PIPELINE_NAME=${{ inputs.SOURCE_REPOSITORY || github.repository }}: ${{ inputs.SOURCE_TITLE || github.event.pull_request.title || github.ref_name }}
          COMMON_BENCH_VERSION=${{ inputs.COMMON_BENCH_VERSION }}
    - name: Set pending EICweb status
      if: ${{ github.event_name != 'delete' && !inputs.SOURCE_SHA }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DETECTOR_CONFIG: epic_craterlake
      run: |
        curl \
          --fail-with-body \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -d '{"context": "eicweb/detector_benchmarks (nightly, '"$DETECTOR_CONFIG"')", "state": "pending", "description": "Waiting for response from the EICweb", "target_url": "${{ fromJson(steps.trigger_eicweb.outputs.json).web_url }}"}' \
          "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}"
