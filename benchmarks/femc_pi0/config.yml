.script:sim:femc_pi0:
  script:
    - snakemake $SNAKEMAKE_FLAGS --cores 1 sim_output/femc_pi0/epic_craterlake_rec_pi0_${P}GeV.edm4eic.root

.script:bench:femc_pi0:
  script:
    - snakemake $SNAKEMAKE_FLAGS --cores $MAX_CORES_PER_JOB results/epic_craterlake/femc_pi0

sim:femc_pi0:
  extends: .det_benchmark
  stage: simulate
  rules:
    - if: $BENCHMARK_RUNNER != "htcondor"
  parallel:
    matrix:
      - P: 10
      - P: 20
      - P: 30
      - P: 40
      - P: 50
      - P: 60
      - P: 70
      - P: 80
  script:
    - !reference [.script:sim:femc_pi0, script]
  retry:
    max: 2
    when:
      - runner_system_failure

bench:femc_pi0:
  extends: .det_benchmark
  stage: benchmarks
  allow_failure: true # snooze until https://github.com/eic/detector_benchmarks/issues/186 is resolved
  rules:
    - if: $BENCHMARK_RUNNER != "htcondor"
  needs: ["sim:femc_pi0"]
  script:
    - !reference [.script:bench:femc_pi0, script]

sim_bench:femc_pi0:
  extends: .det_benchmark:htcondor
  stage: benchmarks
  allow_failure: true # snooze until https://github.com/eic/detector_benchmarks/issues/186 is resolved
  rules:
    - if: $BENCHMARK_RUNNER == "htcondor"
  script:
    - !reference [.script:bench:femc_pi0, script]

collect_results:femc_pi0:
  extends: .det_benchmark
  stage: collect
  allow_failure: true # snooze until https://github.com/eic/detector_benchmarks/issues/186 is resolved
  needs:
    - job: "bench:femc_pi0"
      optional: true
    - job: "sim_bench:femc_pi0"
      optional: true
  when: always
  script:
    - ls -al
    - mv results{,_save}/ # move results directory out of the way to preserve it
    - snakemake $SNAKEMAKE_FLAGS --cores 1 --delete-all-output results/epic_craterlake/femc_pi0
    - mv results{_save,}/
