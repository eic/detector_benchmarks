bench:panda:
  #extends: .det_benchmark
  stage: benchmarks
  timeout: 24 hours
  script:
    - chmod 600 "$X509_USER_PROXY"
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -r benchmarks/panda/requirements.txt
    # Prepend virtualenv's location to PYTHONPATH
    - export PYTHONPATH="$(echo "$VIRTUAL_ENV"/lib/python*/site-packages):$PYTHONPATH"
    - source .venv/etc/panda/panda_setup.sh
    - mkdir ~/.pathena
    - echo "$PANDA_TOKEN" > ~/.pathena/.token
    - '[[ ! -z "$PANDACACHE_URL" ]] || die "PANDACACHE_URL is not set"'
    - '[[ ! -z "$PANDAMON_URL" ]] || die "PANDAMON_URL is not set"'
    - '[[ ! -z "$PANDA_AUTH" ]] || die "PANDA_AUTH is not set"'
    - '[[ ! -z "$PANDA_AUTH_VO" ]] || die "PANDA_AUTH_VO is not set"'
    - '[[ ! -z "$PANDA_NICKNAME" ]] || die "PANDA_NICKNAME is not set"'
    - '[[ ! -z "$PANDA_TOKEN" ]] || die "PANDA_TOKEN is not set"'
    - '[[ ! -z "$PANDA_URL" ]] || die "PANDA_URL is not set"'
    - '[[ ! -z "$PANDA_URL" ]] || die "PANDA_URL is not set"'
    - '[[ ! -z "$PANDA_URL_SSL" ]] || die "PANDA_URL_SSL is not set"'
    - '[[ ! -z "$PANDA_VO" ]] || die "PANDA_VO is not set"'
    - PANDA_DS="user.${PANDA_NICKNAME}.eicweb-${CI_PIPELINE_ID}-${CI_JOB_ID}"
    - export DETECTOR_CONFIG=epic
    - export DETECTOR_PATH=/opt/detector/epic-main/share/epic
    - |
      snakemake \
        --default-storage-provider=rucio \
        --default-storage-prefix=rucio://user.veprbl/${PANDA_DS}. \
        --storage-rucio-upload-rse=E1_BNL_DISK_1 \
        --storage-rucio-upload-dataset=${PANDA_DS} \
        --storage-rucio-vo=eic \
        --storage-rucio-auth-type=x509_proxy \
        --storage-rucio-download-rse=E1_BNL_DISK_1 \
        --storage-rucio-cache-scope \
        --executor=panda \
        --panda-max-attempt=3 \
        results/nhcal_basic_distribution/energy_resolution_analysis_epic_craterlake.png \
        --default-resources mem_mb=3072 disk_mb=4096 \
        -c1 --jobs 32 --use-singularity
    - rucio did list "${PANDA_DS}*"

collect_results:panda:
  extends: .det_benchmark
  stage: collect
  needs:
    - ["bench:panda"]
  script:
    - ls -lrht
